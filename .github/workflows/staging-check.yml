# -----------------------------------------------------------------------------
# Real staging / promotion gate — use YOUR cluster, not kind.
#
# 1. Add repo secret STAGING_KUBECONFIG (full kubeconfig for staging).
# 2. Optionally add SENTINEL_CONFIG (multiline YAML) if sentinel.config.yaml
#    is not committed.
# 3. Uncomment pull_request (and adjust branches) so PRs are blocked when
#    staging-sentinel check fails.
#
# This stub only runs on workflow_dispatch so public clones without secrets
# do not get failing checks on every PR. Replace with your real cluster setup.
# -----------------------------------------------------------------------------
name: Staging parity (real cluster)

on:
  workflow_dispatch:
  # pull_request:
  #   branches:
  #     - main

concurrency:
  group: staging-parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        env:
          KUBECONFIG_STAGING: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          if [ -z "$KUBECONFIG_STAGING" ]; then
            echo "::error::Add repo secret STAGING_KUBECONFIG (kubeconfig YAML for the staging cluster), or use workflow only after configuring secrets."
            exit 1
          fi
          printf '%s\n' "$KUBECONFIG_STAGING" > ~/.kube/config

      - name: Prepare sentinel.config.yaml
        env:
          SENTINEL_CONFIG: ${{ secrets.SENTINEL_CONFIG }}
        run: |
          if [ -f sentinel.config.yaml ]; then
            exit 0
          fi
          if [ -n "$SENTINEL_CONFIG" ]; then
            printf '%s\n' "$SENTINEL_CONFIG" > sentinel.config.yaml
          else
            cp sentinel.config.example.yaml sentinel.config.yaml
          fi

      - name: Check staging parity
        run: node dist/index.js check --config sentinel.config.yaml
